<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Painel — Layout Dinâmico</title>
<link rel="stylesheet" href="app.css" />
<style>
  .statnum{font-family:var(--font-display);font-weight:600;font-size:var(--text-xl);color:var(--color-primary);
    line-height:1;font-variant-numeric:tabular-nums}
  .statlbl{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:.35rem}
  .feed li{list-style:none;display:flex;justify-content:space-between;gap:.8rem;padding:.55rem 0;
    border-top:1px solid var(--color-divider);font-size:var(--text-sm)}
  .feed{margin:0;padding:0}.feed li:first-child{border-top:0}
  .feed .who{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--color-text-faint)}
  .actchip{font-family:var(--font-mono);font-size:var(--text-xs);border-radius:999px;padding:.1rem .5rem;
    background:var(--color-primary-soft);color:var(--color-primary)}
</style>
</head>
<body>
<div id="appbar"></div>
<main class="container page">
  <div class="between reveal">
    <div>
      <p class="eyebrow">Painel</p>
      <h1>Visão geral</h1>
    </div>
    <div class="badge info" id="activeVer">layout —</div>
  </div>

  <p class="sec-title">Indicadores</p>
  <div class="cards reveal" id="cards"></div>

  <div class="split reveal" style="margin-top:1.6rem">
    <section>
      <p class="sec-title">Campos pendentes</p>
      <div class="card"><ul class="feed" id="pending"></ul>
        <p class="muted" style="margin:.7rem 0 0"><a href="governanca.html">abrir governança &rarr;</a></p></div>
    </section>
    <section>
      <p class="sec-title">Atividade recente</p>
      <div class="card"><ul class="feed" id="audit"></ul>
        <p class="muted" style="margin:.7rem 0 0"><a href="auditoria.html">ver trilha completa &rarr;</a></p></div>
    </section>
  </div>
</main>

<script src="auth.js"></script>
<script src="shell.js"></script>
<script>
  if (!requireLogin()) throw new Error("redirect");
  const API = location.origin;

  function stat(n, label){
    return `<div class="card card-h"><div class="statnum">${n}</div><div class="statlbl">${label}</div></div>`;
  }

  async function load(){
    const d = await (await authFetch(`${API}/dashboard`)).json();
    document.getElementById("activeVer").textContent =
      `layout #${d.activeVersion.id} · ${d.activeVersion.fieldCount} campos (${d.activeVersion.visibleFields} visíveis)`;
    document.getElementById("cards").innerHTML =
      stat(d.counts.registros, "Registros") + stat(d.counts.versions, "Versões de layout") +
      stat(d.counts.draftVersions, "Versões DRAFT") + stat(d.counts.pendingFields, "Campos pendentes");

    const pend = document.getElementById("pending");
    pend.innerHTML = d.pending.length
      ? d.pending.map(p => `<li><span><code>${p.logicalName}</code> <span class="faint">(${p.inferredType})</span></span><span class="who">${p.occurrences}×</span></li>`).join("")
      : '<li class="muted">Nenhum campo pendente.</li>';

    const aud = document.getElementById("audit");
    aud.innerHTML = d.recentAudit.length
      ? d.recentAudit.map(e => `<li><span><span class="actchip">${e.action}</span> <code>${e.entityId ?? "-"}</code></span><span class="who">${e.actor} · ${e.ts}</span></li>`).join("")
      : '<li class="muted">Sem eventos ainda.</li>';
  }
  load();
</script>
</body>
</html>
