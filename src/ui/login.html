<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Entrar — Layout Dinâmico</title>
<link rel="stylesheet" href="app.css" />
<style>
  body{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:1.5rem}
  .loginwrap{width:100%;max-width:380px}
  .brandbig{display:flex;align-items:center;gap:.6rem;justify-content:center;font-family:var(--font-display);
    font-weight:600;font-size:var(--text-lg);margin-bottom:1.2rem}
  .card form{display:flex;flex-direction:column;gap:.2rem}
  .err{color:var(--crit);font-size:var(--text-sm);min-height:1.1rem;margin-top:.5rem}
  .hint{margin-top:1rem;font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.7}
</style>
</head>
<body>
  <div class="loginwrap">
    <div class="brandbig">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="1.4" y="1.4" width="29.2" height="29.2" rx="8" stroke="var(--color-primary)" stroke-width="2"/>
        <rect x="7" y="8" width="12" height="2.6" rx="1.3" fill="var(--color-primary)"/>
        <rect x="7" y="14.7" width="18" height="2.6" rx="1.3" fill="var(--color-primary)" opacity=".55"/>
        <rect x="7" y="21.4" width="9" height="2.6" rx="1.3" fill="var(--color-primary)"/>
      </svg>
      Layout Dinâmico
    </div>
    <div class="card">
      <h1 style="margin:0 0 .2rem">Entrar</h1>
      <p class="muted" style="margin:0 0 1rem">Acesse com um dos perfis de demonstração.</p>
      <form id="loginForm">
        <div class="field"><label>Tenant</label><input id="tenant" value="default" autocomplete="organization"></div>
        <div class="field" style="margin-top:.6rem"><label>Usuário</label><input id="username" value="admin" autocomplete="username"></div>
        <div class="field" style="margin-top:.6rem"><label>Senha</label><input id="password" type="password" value="" autocomplete="current-password"></div>
        <button class="btn btn-primary" id="btn" type="submit" style="margin-top:1rem;width:100%">Entrar</button>
      </form>
      <div class="err" id="err"></div>
      <div class="hint">
        <span class="tok">admin/admin123</span> — tudo + PII ·
        <span class="tok">editor/editor123</span> — edita, sem PII ·
        <span class="tok">viewer/viewer123</span> — só leitura mascarada
      </div>
      <div class="hint" style="margin-top:.4rem">Primeira vez? <a href="guia.html">Ver o guia de uso &rarr;</a></div>
    </div>
  </div>

<script src="auth.js"></script>
<script src="shell.js"></script>
<script>
  (function(){ var s=localStorage.getItem("ld-theme"); if(s) document.documentElement.setAttribute("data-theme",s); })();
  if (AUTH.token()) location.href = "dashboard.html";

  async function doLogin(ev){
    if (ev) ev.preventDefault();
    const body = {
      tenant: document.getElementById("tenant").value.trim() || "default",
      username: document.getElementById("username").value.trim(),
      password: document.getElementById("password").value,
    };
    document.getElementById("err").textContent = "";
    const res = await fetch(`${location.origin}/auth/login`, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
    if (!res.ok){ document.getElementById("err").textContent = "Credenciais inválidas."; return; }
    const d = await res.json();
    AUTH.set(d.token, { username:d.username, tenant:d.tenant, roles:d.roles });
    location.href = "dashboard.html";
  }
  document.getElementById("loginForm").addEventListener("submit", doLogin);
</script>
</body>
</html>
