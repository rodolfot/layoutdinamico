<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Consulta — Layout Dinâmico</title>
<link rel="stylesheet" href="app.css" />
<style>
  .reglist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.35rem;max-height:70vh;overflow:auto}
  .reglist li{padding:.6rem .75rem;border:1px solid var(--color-border);border-radius:var(--r-md);cursor:pointer;
    background:var(--color-surface);transition:background .15s var(--ease),border-color .15s var(--ease)}
  .reglist li:hover{background:var(--color-surface-offset)}
  .reglist li.sel{background:var(--color-primary-soft);border-color:transparent}
  .reglist .nm{font-weight:600;font-size:var(--text-sm)}
  .kv{display:flex;justify-content:space-between;gap:1rem;padding:.4rem 0;border-bottom:1px dashed var(--color-divider);font-size:var(--text-sm)}
  .kv:last-child{border-bottom:0}.kv .lab{color:var(--color-text-faint)}.kv .val{font-weight:600}
  .ro{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--warn);border:1px solid oklch(from var(--warn) l c h /.35);
    border-radius:4px;padding:0 .3rem;margin-left:.4rem}
  details{margin-top:.8rem}summary{cursor:pointer;color:var(--color-text-muted);font-size:var(--text-sm)}
  #raw,#hist{font-family:var(--font-mono);font-size:var(--text-xs);white-space:pre-wrap;word-break:break-word;
    background:var(--color-surface-offset);border-radius:var(--r-md);padding:.9rem;margin-top:.6rem;color:var(--color-text-muted)}
  fieldset{border:1px solid var(--color-divider);border-radius:var(--r-md);margin:0 0 .9rem;padding:.4rem 1rem .8rem}
  legend{font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-faint);padding:0 .4rem}
</style>
</head>
<body>
<div id="appbar"></div>
<main class="container page">
  <p class="eyebrow reveal">Consulta</p>
  <h1 class="reveal">Registros</h1>
  <p class="muted reveal" style="max-width:64ch">Dados sensíveis aparecem revelados apenas se o seu usuário
    tem o papel <span class="tok">pii</span> — caso contrário vêm mascarados.</p>

  <div class="split reveal" style="margin-top:1rem">
    <section>
      <p class="sec-title">Lista</p>
      <ul class="reglist" id="lista"></ul>
    </section>
    <section>
      <p class="sec-title" id="titulo">Selecione um registro</p>
      <div class="card" id="view"><p class="muted">Clique num registro à esquerda.</p></div>
      <details><summary>JSON bruto (inclui campos desconhecidos)</summary><div id="raw">—</div></details>
      <details><summary>Histórico de alterações</summary><div id="hist">—</div></details>
    </section>
  </div>
</main>

<script src="auth.js"></script>
<script src="shell.js"></script>
<script>
  if (!requireLogin()) throw new Error("redirect");
  const API = location.origin;
  let selId = null;

  async function loadList(){
    const { registros } = await (await authFetch(`${API}/registros?limit=200`)).json();
    const ul = document.getElementById("lista");
    ul.innerHTML = registros.length ? "" : '<li class="muted" style="cursor:default">nenhum registro</li>';
    registros.forEach(r=>{
      const li = document.createElement("li");
      li.innerHTML = `<div class="nm">${r.nome}</div><div class="faint" style="font-size:var(--text-xs)">id ${r.id} · CPF ${r.cpf}</div>`;
      if (r.id === selId) li.classList.add("sel");
      li.onclick = ()=> selectReg(r.id);
      ul.appendChild(li);
    });
  }

  async function selectReg(id){
    selId = id; await loadList();
    document.getElementById("titulo").textContent = `Registro #${id}`;
    const { fields } = await (await authFetch(`${API}/registros/${id}/view`)).json();
    const sections = {};
    fields.forEach(f=>{ (sections[f.section||"Geral"] ||= []).push(f); });
    const box = document.getElementById("view");
    box.innerHTML = "";
    for (const [section, fs] of Object.entries(sections)){
      const el = document.createElement("fieldset");
      el.innerHTML = `<legend>${section}</legend>`;
      fs.forEach(f=>{
        const ro = f.editable ? "" : '<span class="ro">somente leitura</span>';
        const val = f.value === null ? '<span class="muted">—</span>' : formatVal(f);
        const row = document.createElement("div");
        row.className = "kv";
        row.innerHTML = `<span class="lab">${f.label}${ro}</span><span class="val">${val}</span>`;
        el.appendChild(row);
      });
      box.appendChild(el);
    }
    const raw = await (await authFetch(`${API}/registros/${id}`)).json();
    document.getElementById("raw").textContent = JSON.stringify(raw, null, 2);
    const { history } = await (await authFetch(`${API}/registros/${id}/history`)).json();
    document.getElementById("hist").innerHTML = history.length
      ? history.map(h=>`v${h.versionNo} · ${h.operation} — ${h.changedBy} · ${h.changedAt}`).join("\n")
      : "sem histórico";
  }

  function formatVal(f){
    if (Array.isArray(f.value)) return f.value.join(", ");
    if (f.dataType === "BOOLEAN") return f.value ? "Sim" : "Não";
    return String(f.value);
  }
  loadList();
</script>
</body>
</html>
